<article>
  <h1>Form Penjadwal Pertemuan</h1>
  <form action="#" method="post">

    <fieldset>
      <legend>Informasi Pribadi</legend>

      <label for="nama">Nama</label>
      <input type="text" id="nama" name="nama"
        placeholder="Nama lengkap" required><br>

      <label for="telepon">No. Telepon</label>
      <input type="tel" id="telepon" name="telepon"
        placeholder="Contoh: 0812-34567890"
        pattern="[0-9]{4}-[0-9]{6,10}" 
        title="Format: 4 angka depan - sisanya angka (Min 6 angka)"
        required><br>
      <small style="margin-left: 205px; color: #666;">Format: 08xx-xxxxxxx</small><br><br>

      <label for="email">Alamat Email</label>
      <input type="email" id="email" name="email"
        placeholder="nama@domain.com" required><br>

      <label for="tgl_lahir">Tanggal Lahir</label>
      <input type="date" id="tgl_lahir" name="tgl_lahir"
        min="1950-01-01"
        max="2010-01-01"
        required><br>
    </fieldset>

    <fieldset>
      <legend>Permintaan Pertemuan</legend>

      <label for="tujuan">Tujuan Pertemuan</label>
      <input type="text" id="tujuan" name="tujuan"
        placeholder="Tujuan pertemuan" required><br>

      <label for="kepentingan">Tingkat Kepentingan (0-10)</label>
      <input type="range" id="kepentingan" name="kepentingan"
        min="0" max="10" value="5" 
        oninput="this.nextElementSibling.value = this.value">
      <output>5</output><br>

      <label for="tanggal">Tanggal Pertemuan</label>
      <input type="date" id="tanggal" name="tanggal"
        min="2026-04-08"
        required><br>

      <label for="waktu">Waktu (17:00 - 21:00)</label>
      <input type="time" id="waktu" name="waktu"
        min="17:00" max="21:00"
        required><br>
    </fieldset>

    <div style="margin-top: 10px;">
      <input type="submit" value="Kirim Jadwal" style="padding: 10px 20px; cursor: pointer; background-color: #666; color: white; border: none; border-radius: 4px;">
      <input type="reset" value="Reset Form" style="padding: 10px 20px; cursor: pointer;">
    </div>

  </form>
</article>
