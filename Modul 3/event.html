<!DOCTYPE html>
<html lang="en">
<head>
  <title>Halaman Event</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Aris Musta'in">
  <meta name="nim" content="253307026">
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; }
    header {
      background-color: #666;
      padding: 30px;
      text-align: center;
      font-size: 35px;
      color: white;
    }
    nav {
      float: left;
      width: 30%;
      height: 300px;
      background: #ccc;
      padding: 20px;
    }
    nav ul { list-style-type: none; padding: 0; }
    article {
      float: left;
      padding: 20px;
      width: 70%;
      background-color: #f1f1f1;
      min-height: 300px;
    }
    section::after { content: ""; display: table; clear: both; }
    footer {
      background-color: #777;
      padding: 10px;
      text-align: center;
      color: white;
    }
    .galeri-gambar { display: flex; flex-wrap: wrap; gap: 8px; }
    .galeri-gambar img {
      width: 180px;
      height: 130px;
      object-fit: cover;
      border: 2px solid #ccc;
      cursor: pointer;
      transition: transform 0.2s;
    }
    @media (max-width: 600px) {
      nav, article { width: 100%; height: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h2>Judul Website</h2>
  </header>

  <section>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="gambar.html">Gambar</a></li>
        <li><a href="event.html">Event</a></li>

        <li><a href="svg.html">SVG</a></li>
        <li><a href="canvas.html">Canvas</a></li>
      </ul>
    </nav>

    <article>
  <h1>Gambar dengan Mouse & Window Event</h1>
  <p>Coba arahkan mouse, klik, klik kanan, atau scroll pada gambar di bawah!</p>
  
  <div class="galeri-gambar">

    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=300" alt="Gambar 1"
      onmouseover="this.style.border='3px solid red'; this.style.transform='scale(1.1)'"
      onmouseout="this.style.border='2px solid #ccc'; this.style.transform='scale(1)'">

    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=300" alt="Gambar 2"
      onclick="alert('Anda mengklik Gambar 2!')">

    <img src="https://images.unsplash.com/photo-1434725039720-abb26e22fed8?w=300" alt="Gambar 3"
      ondblclick="alert('Anda melakukan double click pada Gambar 3!')">

    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=300" alt="Gambar 4"
      onmousedown="this.style.opacity='0.5'"
      onmouseup="this.style.opacity='1'">

    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300" alt="Gambar 5"
      onwheel="this.style.borderRadius='50%'"
      onmouseleave="this.style.borderRadius='0%'">

    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=300" alt="Gambar 6"
      oncontextmenu="alert('Maaf, klik kanan pada gambar ini dilarang!'); return false;">

    <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=300" alt="Gambar 7"
      oncopy="alert('Dilarang menyalin gambar ini tanpa izin!'); return false;">

    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=300" alt="Gambar 8"
      onmousemove="this.style.filter='grayscale(100%)'"
      onmouseleave="this.style.filter='grayscale(0%)'">

  </div>
</article>
  </section>

  <footer>
    <p>Footer</p>
  </footer>

</body>
</html>
