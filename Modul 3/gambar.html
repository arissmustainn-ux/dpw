  <style>

    section::after {

    footer {

      color: white;
    }
    .galeri-gambar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .galeri-gambar img {
      width: 180px;
      height: 130px;
      object-fit: cover;
      border: 2px solid #ccc;
    }
    @media (max-width: 600px) {
      nav, article {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
