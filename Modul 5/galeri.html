<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galeri Foto Flexbox</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .galeri {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px; /* Memberi jarak antar kotak */
    }

    .galeri-item {
      /* GANTI ANGKA 200 DI BAWAH SESUAI DIGIT TERAKHIR NRP */
      width: 200px;  
      height: 200px; 
      overflow: hidden;
      border: 3px solid #fff;
      border-radius: 8px;
      background-color: #ddd;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .galeri-item:hover {
      transform: scale(1.05); /* Efek zoom saat kursor di atas gambar */
    }

    .galeri-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Agar gambar tidak penyet */
    }
  </style>
</head>
<body>

  <h2>Galeri Foto Alam - 18 Item</h2>

  <div class="galeri">
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=1" alt="Foto 1"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=2" alt="Foto 2"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=3" alt="Foto 3"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=4" alt="Foto 4"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=5" alt="Foto 5"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=6" alt="Foto 6"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=7" alt="Foto 7"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=8" alt="Foto 8"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=9" alt="Foto 9"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=10" alt="Foto 10"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=11" alt="Foto 11"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=12" alt="Foto 12"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=13" alt="Foto 13"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=14" alt="Foto 14"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=15" alt="Foto 15"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=16" alt="Foto 16"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=17" alt="Foto 17"></div>
    <div class="galeri-item"><img src="https://picsum.photos/300/300?random=18" alt="Foto 18"></div>
  </div>

</body>
</html>
