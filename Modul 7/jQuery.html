<style>
    .menu { list-style: none; padding: 0; }
    .menu li { display: inline; margin-right: 20px; cursor: pointer; padding: 5px; }
    .aktif { background-color: yellow; }
</style>

<ul class="menu">
    <li>Home</li>
    <li>Profil</li>
    <li>Kontak</li>
</ul>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(".menu li").click(function(){
        $(".menu li").removeClass("aktif");
        $(this).addClass("aktif");
        alert("Anda memilih menu: " + $(this).text());
    });
</script>
