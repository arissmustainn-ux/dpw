<html>
<head>
    <title>Validasi Masukan</title> </head>
<body>
    <script language="JavaScript"> // [cite: 81]
        function cekNama(form) { // [cite: 81]
            if (form.elements[0].value == "") { // [cite: 82]
                alert("Nama harus dimasukkan"); // [cite: 83]
                form.nama.focus(); // [cite: 84]
                form.nama.select(); // [cite: 85]
                return false; // [cite: 87]
            }
            alert("Terima kasih, " + form.elements[0].value); // [cite: 91, 93]
            return true; // [cite: 95]
        }
    </script>

    <form name="formku"> <pre>
Nama: <input type="text" name="nama"><br> <input type="button" value="Kirim" onclick="cekNama(this.form)"> </pre>
    </form>
</body>
</html>
